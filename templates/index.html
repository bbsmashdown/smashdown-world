<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smashdown World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,400;1,300;1,400&family=iA+Writer+Mono+S:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    [data-theme="dark"] {
      --bg:         #100F0F;
      --ui:         #282726;
      --ui-2:       #343331;
      --ui-3:       #403E3C;
      --tx-3:       #575653;
      --tx-2:       #878580;
      --tx:         #CECDC3;
      --cyan:       #3AA99F;
      --hover-link: #3AA99F;
      --logo-color: #CECDC3;
    }
    [data-theme="light"] {
      --bg:         #FFFCF0;
      --ui:         #E6E4D9;
      --ui-2:       #DAD8CE;
      --ui-3:       #CECDC3;
      --tx-3:       #B7B5AC;
      --tx-2:       #6F6E69;
      --tx:         #100F0F;
      --cyan:       #24837B;
      --hover-link: #AF3029;
      --logo-color: #100F0F;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 17px; -webkit-font-smoothing: antialiased; }

    body {
      background: var(--bg);
      color: var(--tx);
      font-family: 'Newsreader', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 2.5rem 2rem;
      transition: background 0.2s ease, color 0.2s ease;
    }

    nav {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 1.4rem;
      animation: fade 0.4s ease both;
    }

    .nav-right {
      position: relative;
      display: flex;
      align-items: center;
      gap: 1.4rem;
    }

    .nav-dropdown {
      position: relative;
      display: flex;
      align-items: center;
      z-index: 200;
    }

    .nav-link {
      font-family: 'iA Writer Mono S', monospace;
      font-size: 0.75rem;
      color: var(--tx-3);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.15s;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    .nav-link:hover { color: var(--hover-link); }

    .nav-chevron-btn {
      background: none;
      border: none;
      padding: 0 0 0 0.15rem;
      margin: 0;
      cursor: pointer;
      line-height: 1;
      display: inline-flex;
      align-items: center;
    }

    .nav-chevron {
      font-size: 0.65rem;
      color: var(--tx-3);
      transition: color 0.15s, transform 0.2s;
      display: inline-block;
      line-height: 1;
    }
    .nav-chevron-btn:hover .nav-chevron { color: var(--tx-2); }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      background: transparent;
      border: none;
      padding: 0.5rem 0 0.2rem 0;
      min-width: max-content;
      z-index: 200;
    }


    .dropdown-item {
      display: block;
      font-family: 'iA Writer Mono S', monospace;
      font-size: 0.72rem;
      color: var(--tx-3);
      text-decoration: none;
      letter-spacing: 0.05em;
      padding: 0.25rem 0;
      text-align: right;
      transition: color 0.15s;
      white-space: nowrap;
    }
    .dropdown-item:hover { color: var(--hover-link); }

    .nav-dropdown.open .dropdown-menu { display: block; }
    .nav-dropdown.open .nav-chevron { transform: rotate(90deg); color: var(--tx-2); }
    .nav-dropdown.open .nav-link { color: var(--tx-2); }

    .theme-toggle {
      position: relative; width: 44px; height: 24px;
      cursor: pointer; flex-shrink: 0;
    }
    .theme-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--ui-2); border: 1px solid var(--ui-3);
      border-radius: 12px; transition: background 0.25s, border-color 0.25s;
    }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 16px; height: 16px; background: var(--tx-2);
      border-radius: 50%; transition: transform 0.25s;
      display: flex; align-items: center; justify-content: center;
    }
    .theme-toggle input:checked ~ .toggle-track { background: var(--ui); border-color: var(--ui-2); }
    .theme-toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }
    .icon-moon, .icon-sun {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s; pointer-events: none;
    }
    .icon-sun { opacity: 0; }
    .theme-toggle input:checked ~ .toggle-thumb .icon-moon { opacity: 0; }
    .theme-toggle input:checked ~ .toggle-thumb .icon-sun  { opacity: 1; }

    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0.45rem;
      animation: fade 0.5s 0.1s ease both;
      width: 100%;
    }

    .title-group {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      width: fit-content;
    }

    .mountain-line {
      display: block;
      width: 100%;
      height: auto;
      margin-bottom: 0.2em;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--tx);
      white-space: nowrap;
    }

    .subtitle {
      max-width: 90vw;
    }

    .subtitle {
      font-family: 'iA Writer Mono S', monospace;
      font-size: 0.78rem;
      color: var(--cyan);
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }

    .updated {
      font-family: 'iA Writer Mono S', monospace;
      font-size: 0.7rem;
      color: var(--tx-3);
      letter-spacing: 0.03em;
      margin-top: 0.15rem;
    }

    .tent-link {
      position: fixed;
      bottom: 1.6rem; right: 1.8rem;
      opacity: 0.18;
      transition: opacity 0.25s;
      text-decoration: none;
      line-height: 0;
    }
    .tent-link:hover { opacity: 0.55; }

    @keyframes fade {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

  <script>
    const html   = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const saved  = localStorage.getItem('sw-theme') || 'dark';
    setTheme(saved);
    toggle.addEventListener('change', () => setTheme(toggle.checked ? 'light' : 'dark'));
    function setTheme(t) {
      html.dataset.theme = t;
      toggle.checked     = t === 'light';
      localStorage.setItem('sw-theme', t);
    }

    // Dropdown — hover on desktop, chevron tap on mobile
    const dropdown = document.querySelector('.nav-dropdown');
    if (dropdown) {
      const chevronBtn = dropdown.querySelector('.nav-chevron-btn');
      const menu       = dropdown.querySelector('.dropdown-menu');
      let closeTimer   = null;

      if (menu) {
        // Desktop: open on mouseenter, close on mouseleave with small delay
        dropdown.addEventListener('mouseenter', function() {
          clearTimeout(closeTimer);
          dropdown.classList.add('open');
        });
        dropdown.addEventListener('mouseleave', function() {
          closeTimer = setTimeout(function() {
            dropdown.classList.remove('open');
          }, 300);
        });
        // Keep open if mouse enters the menu itself
        menu.addEventListener('mouseenter', function() {
          clearTimeout(closeTimer);
        });
        menu.addEventListener('mouseleave', function() {
          closeTimer = setTimeout(function() {
            dropdown.classList.remove('open');
          }, 300);
        });
      }

      // Mobile: chevron tap toggles
      if (chevronBtn && menu) {
        chevronBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          dropdown.classList.toggle('open');
        });
      }
    }
  </script>

</body>
</html>
