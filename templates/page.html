<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — Smashdown World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,400;1,300;1,400&family=iA+Writer+Mono+S:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    [data-theme="dark"] {
      --bg:              #100F0F;
      --bg-2:            #1C1B1A;
      --ui:              #282726;
      --ui-2:            #343331;
      --ui-3:            #403E3C;
      --tx-3:            #575653;
      --tx-2:            #878580;
      --tx:              #CECDC3;
      --red:             #D14D41;
      --cyan:            #3AA99F;
      --accent-subtitle: #3AA99F;
      --accent-book:     #3AA99F;
      --hover-home:      #3AA99F;
      --logo-color:     #CECDC3;
    }
    [data-theme="light"] {
      --bg:              #FFFCF0;
      --bg-2:            #F2F0E5;
      --ui:              #E6E4D9;
      --ui-2:            #DAD8CE;
      --ui-3:            #CECDC3;
      --tx-3:            #B7B5AC;
      --tx-2:            #6F6E69;
      --tx:              #100F0F;
      --red:             #AF3029;
      --cyan:            #24837B;
      --accent-subtitle: #205EA6;
      --accent-book:     #205EA6;
      --hover-home:      #AF3029;
      --logo-color:     #100F0F;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 17px; -webkit-font-smoothing: antialiased; }

    body {
      background: var(--bg);
      color: var(--tx);
      font-family: 'Newsreader', Georgia, serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 4rem 1.5rem 6rem;
      transition: background 0.2s ease, color 0.2s ease;
    }

    main { width: 100%; max-width: 580px; }

    /* ── Nav ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4rem;
      animation: fade 0.4s ease both;
    }
    .breadcrumb {
      display: flex;
      align-items: center;
      font-family: 'iA Writer Mono S', monospace;
      font-size: 0.78rem;
    }
    .bc-home {
      color: var(--tx-2);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }
    .bc-home:hover { color: var(--hover-home); }
    .bc-sep { color: var(--ui-3); margin: 0 0.4rem; }
    .bc-page { color: var(--tx-3); letter-spacing: 0.02em; }

    /* ── Nav right + dropdown ── */
    .nav-right {
      display: flex;
      align-items: center;
      gap: 1.4rem;
    }
    .nav-dropdown { position: relative; display: flex; align-items: center; }
    .nav-link {
      font-family: 'iA Writer Mono S', monospace;
      font-size: 0.75rem;
      color: var(--tx-3);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.15s;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    .nav-link:hover { color: var(--tx-2); }
    .nav-link.active { color: var(--accent-subtitle); }
    .nav-chevron-btn {
      background: none;
      border: none;
      padding: 0 0 0 0.15rem;
      margin: 0;
      cursor: pointer;
      line-height: 1;
      display: inline-flex;
      align-items: center;
    }

    .nav-chevron {
      font-size: 0.65rem;
      color: var(--tx-3);
      transition: color 0.15s, transform 0.2s;
      display: inline-block;
      line-height: 1;
    }
    .nav-chevron-btn:hover .nav-chevron { color: var(--tx-2); }
    .dropdown-menu {
      display: none;
      position: absolute;
      top: 100%;
      padding-top: 0.5rem;
      right: 0;
      background: transparent;
      border: none;
      min-width: 80px;
      z-index: 200;
      pointer-events: none;
    }

    .dropdown-menu a {
      pointer-events: auto;
    }
    .dropdown-item {
      display: block;
      font-family: 'iA Writer Mono S', monospace;
      font-size: 0.72rem;
      color: var(--tx-3);
      text-decoration: none;
      letter-spacing: 0.05em;
      padding: 0.25rem 0;
      transition: color 0.15s;
      white-space: nowrap;
      text-align: right;
    }
    .dropdown-item:hover { color: var(--hover-home); }
    .dropdown-item.active { color: var(--accent-subtitle); }
    .nav-dropdown.open .dropdown-menu { display: block; }
    .nav-dropdown.open .nav-chevron { transform: rotate(90deg); color: var(--tx-2); }
    .nav-dropdown.open .nav-link { color: var(--tx-2); }

    /* ── Toggle ── */
    .theme-toggle {
      position: relative;
      width: 44px; height: 24px;
      cursor: pointer; flex-shrink: 0;
    }
    .theme-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--ui-2);
      border: 1px solid var(--ui-3);
      border-radius: 12px;
      transition: background 0.25s, border-color 0.25s;
    }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: var(--tx-2);
      border-radius: 50%;
      transition: transform 0.25s;
      display: flex; align-items: center; justify-content: center;
    }
    .theme-toggle input:checked ~ .toggle-track { background: var(--ui); border-color: var(--ui-2); }
    .theme-toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }
    .icon-moon, .icon-sun {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s; pointer-events: none;
    }
    .icon-sun { opacity: 0; }
    .theme-toggle input:checked ~ .toggle-thumb .icon-moon { opacity: 0; }
    .theme-toggle input:checked ~ .toggle-thumb .icon-sun  { opacity: 1; }

    /* ── Header ── */
    header { margin-bottom: 3rem; animation: fade 0.4s 0.05s ease both; }
    h1 {
      font-size: clamp(1.9rem, 5vw, 2.6rem);
      font-weight: 400; line-height: 1.15;
      letter-spacing: -0.015em; color: var(--tx);
      margin-bottom: 0.4rem;
    }
    .subtitle {
      font-family: 'iA Writer Mono S', monospace;
      font-size: 0.78rem; color: var(--accent-subtitle);
      letter-spacing: 0.03em; margin-bottom: 0.35rem;
      transition: color 0.2s;
    }
    .updated {
      font-family: 'iA Writer Mono S', monospace;
      font-size: 0.72rem; color: var(--tx-3); letter-spacing: 0.03em;
    }

    hr { border: none; border-top: 1px solid var(--ui-2); margin: 2.2rem 0; transition: border-color 0.2s; }

    /* ── Content ── */
    .content { animation: fade 0.4s ease both; }

    /* Content headings — Newsreader serif, like Steph Ango's site */
    .content h1 { font-size: 1.55rem; font-weight: 400; line-height: 1.25; letter-spacing: -0.015em; color: var(--tx); margin: 2rem 0 0.6rem; }
    .content h2 { font-size: 1.1rem; font-weight: 400; line-height: 1.3; letter-spacing: -0.01em; color: var(--tx); margin: 1.8rem 0 0.5rem; }
    .content h3 { font-size: 1rem; font-weight: 400; line-height: 1.4; color: var(--tx-2); margin: 1.4rem 0 0.4rem; font-style: italic; }
    .content h4 { font-family: 'iA Writer Mono S', monospace; font-size: 0.72rem; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-subtitle); margin: 1.2rem 0 0.35rem; }
    .content h5, .content h6 { font-family: 'iA Writer Mono S', monospace; font-size: 0.68rem; color: var(--tx-3); margin: 1rem 0 0.3rem; }

    .content p  { font-size: 1rem; line-height: 1.75; color: var(--tx-2); margin-bottom: 1rem; }
    .content ul, .content ol { padding-left: 1.4rem; margin: 0.5rem 0 1rem; }
    .content li { line-height: 1.7; margin-bottom: 0.2rem; }
    .content ol { list-style: decimal; }
    .content ul { list-style: disc; }
    .content strong { font-weight: 600; }
    .content em { font-style: italic; }
    .content a { color: var(--accent-subtitle); text-decoration: underline; text-decoration-color: var(--ui-3); text-underline-offset: 3px; transition: color 0.15s; }
    .content a:hover { color: var(--hover-home); }
    .content code { font-family: 'iA Writer Mono S', monospace; font-size: 0.82em; background: var(--ui); padding: 0.1em 0.35em; border-radius: 3px; color: var(--tx-2); }
    .content hr { border: none; border-top: 1px solid var(--ui-2); margin: 2rem 0; }

    /* page h1 is the title — keep it large */
    h1 { font-size: clamp(1.9rem, 5vw, 2.6rem); font-weight: 400; line-height: 1.15; letter-spacing: -0.015em; color: var(--tx); margin-bottom: 0.4rem; }

    p { font-size: 1rem; line-height: 1.75; color: var(--tx); }

    /* ── Quote ── */
    blockquote {
      font-size: 1.12rem; font-style: italic; font-weight: 300;
      line-height: 1.6; color: var(--tx);
      padding-left: 1rem;
      border-left: 2px solid var(--accent-subtitle);
      margin-bottom: 0.6rem; transition: border-color 0.2s;
    }
    .attr {
      font-family: 'iA Writer Mono S', monospace;
      font-size: 0.72rem; color: var(--tx-3); padding-left: 1rem;
    }

    /* ── Record player ── */
    .song-card { display: flex; align-items: center; gap: 1.2rem; }
    .turntable {
      flex-shrink: 0; background: #F2F0E5;
      border: 1px solid #DAD8CE; border-radius: 4px;
      overflow: hidden; text-decoration: none; display: block;
      transition: border-color 0.2s;
    }
    .turntable:hover { border-color: #CECDC3; }
    .tt-deck { padding: 4px 4px 3px; }
    .tt-arm {
      transform-origin: 78px 8px; transform: rotate(-18deg);
      transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .turntable:hover .tt-arm { transform: rotate(0deg); }
    .tt-led {
      width: 5px; height: 5px; border-radius: 50%;
      background: #3a3836; border: 1px solid #4a4846; flex-shrink: 0;
      transition: background 0.4s, box-shadow 0.4s, border-color 0.4s;
    }
    .turntable:hover .tt-led {
      background: #879A39; border-color: #879A39;
      box-shadow: 0 0 5px rgba(135,154,57,0.8);
    }
    .tt-console {
      border-top: 1px solid #DAD8CE; padding: 4px 7px;
      display: flex; align-items: center; gap: 6px;
    }
    .tt-knob {
      width: 10px; height: 10px; border-radius: 50%;
      background: #1e1d1c; border: 1px solid #343331;
      position: relative; flex-shrink: 0;
      box-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    .tt-knob::after {
      content: ''; position: absolute; top: 1.5px; left: 50%;
      transform: translateX(-50%); width: 1px; height: 3px;
      background: #CECDC3; border-radius: 1px;
    }
    .tt-knob.k2 { transform: rotate(-50deg); }
    .tt-slider {
      width: 25px; height: 2px; background: #DAD8CE;
      border: 1px solid #CECDC3; border-radius: 2px;
      position: relative; flex-shrink: 0;
    }
    .tt-thumb {
      width: 5px; height: 8px;
      background: linear-gradient(to bottom, #2a2826, #1a1918);
      border: 1px solid #343331; border-radius: 1px;
      position: absolute; top: 50%; left: 38%;
      transform: translate(-50%, -50%);
    }
    .tt-thumb::after {
      content: ''; position: absolute; top: 50%; left: 1px; right: 1px;
      height: 1px; background: #575653; transform: translateY(-50%);
    }
    .song-meta { flex: 1; }
    /* reset all p inside song-card so .content p cascade doesn't bleed in */
    .song-card p {
      all: unset;
      display: block;
    }
    .song-label {
      font-family: 'iA Writer Mono S', monospace; font-size: 0.62rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--tx-3); margin-bottom: 0.2rem;
    }
    .song-title { font-size: 0.98rem; font-style: italic; color: var(--red); line-height: 1.3; transition: color 0.2s; }
    .song-artist { font-family: 'iA Writer Mono S', monospace; font-size: 0.7rem; color: var(--tx-2); margin-top: 0.18rem; }
    .song-hint {
      font-family: 'iA Writer Mono S', monospace; font-size: 0.6rem;
      color: var(--tx-3); margin-top: 0.5rem; letter-spacing: 0.06em;
      opacity: 0; transition: opacity 0.2s;
    }
    .song-card:hover .song-hint { opacity: 1; }

    /* ── Books ── */
    .book-list { display: flex; flex-direction: column; gap: 1rem; }
    .book-card { display: flex; align-items: baseline; flex-wrap: wrap; gap: 0.4rem 0.6rem; }
    .book-title { font-size: 0.98rem; font-style: italic; color: var(--accent-book); line-height: 1.4; transition: color 0.2s; }
    .book-author { font-family: 'iA Writer Mono S', monospace; font-size: 0.7rem; color: var(--tx-2); white-space: nowrap; }
    .book-note {
      font-size: 0.88rem; font-style: italic; color: var(--tx-2);
      line-height: 1.65; margin-top: 0.55rem;
      padding-left: 0.75rem; border-left: 1px solid var(--ui-3); width: 100%;
    }
    /* ── Markdown content styles ── */
    .content p { margin-bottom: 1rem; }
    .content h1 { font-size: 1.6rem; font-weight: 400; color: var(--tx); letter-spacing: -0.02em; margin: 1.4rem 0 0.5rem; line-height: 1.2; }
    .content h2 { font-size: 1.25rem; font-weight: 400; color: var(--tx); letter-spacing: -0.01em; margin: 1.2rem 0 0.4rem; }
    .content h3 { font-family: 'iA Writer Mono S', monospace; font-size: 0.82rem; font-weight: 400; color: var(--tx-2); text-transform: uppercase; letter-spacing: 0.1em; margin: 1rem 0 0.3rem; }
    .content h4 { font-family: 'iA Writer Mono S', monospace; font-size: 0.75rem; color: var(--tx-3); letter-spacing: 0.08em; margin: 0.8rem 0 0.25rem; }
    .content ul, .content ol { padding-left: 1.4rem; margin: 0.5rem 0; }
    .content li { margin-bottom: 0.25rem; line-height: 1.65; }
    .content ol { list-style: decimal; }
    .content ul { list-style: disc; }
    .content a { color: var(--accent-subtitle); text-decoration: underline; text-decoration-color: var(--ui-3); text-underline-offset: 3px; transition: color 0.15s; }
    .content a:hover { color: var(--hover-home); }
    .content strong { font-weight: 600; color: var(--tx); }
    .content em { font-style: italic; }
    .content code { font-family: 'iA Writer Mono S', monospace; font-size: 0.82em; background: var(--ui); padding: 0.1em 0.35em; border-radius: 3px; color: var(--tx-2); }
    .content hr { border: none; border-top: 1px solid var(--ui-2); margin: 1.5rem 0; }

    /* ── Footer ── */
    footer {
      margin-top: 3rem; padding-top: 1.4rem;
      border-top: 1px solid var(--ui);
      display: flex; justify-content: space-between; align-items: baseline;
      animation: fade 0.4s 0.4s ease both;
    }
    .footer-name, .footer-updated {
      font-family: 'iA Writer Mono S', monospace; font-size: 0.7rem; color: var(--tx-3);
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      nav { flex-wrap: wrap; gap: 0.6rem; }
      footer { flex-direction: column; gap: 0.4rem; }
    }
  </style>
</head>
<body>
  <main>
    <nav>
      <div class="breadcrumb">
        <a class="bc-home" href="/">Smashdown World</a>
        <span class="bc-sep">/</span>
        <span class="bc-page">{{page}}</span>
      </div>
      <div class="nav-right">
        {{nav}}
        <label class="theme-toggle" title="Toggle light/dark">
        <input type="checkbox" id="themeToggle">
        <span class="toggle-track"></span>
        <span class="toggle-thumb">
          <span class="icon-moon">
            <svg width="9" height="9" viewBox="0 0 9 9" fill="none">
              <path d="M4.5 1 A3.5 3.5 0 1 0 8 4.5 A2.4 2.4 0 1 1 4.5 1Z" fill="currentColor" opacity="0.8"/>
            </svg>
          </span>
          <span class="icon-sun">
            <svg width="9" height="9" viewBox="0 0 9 9" fill="none">
              <circle cx="4.5" cy="4.5" r="2" fill="currentColor"/>
              <line x1="4.5" y1="0.5" x2="4.5" y2="1.8" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
              <line x1="4.5" y1="7.2" x2="4.5" y2="8.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
              <line x1="0.5" y1="4.5" x2="1.8" y2="4.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
              <line x1="7.2" y1="4.5" x2="8.5" y2="4.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
              <line x1="1.6" y1="1.6" x2="2.5" y2="2.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
              <line x1="6.5" y1="6.5" x2="7.4" y2="7.4" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
              <line x1="6.5" y1="2.5" x2="7.4" y2="1.6" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
              <line x1="1.6" y1="7.4" x2="2.5" y2="6.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
            </svg>
          </span>
        </span>
      </label>
      </div>
    </nav>

    <header>
      <h1>{{title}}</h1>
      <p class="updated">Updated {{updated}}</p>
    </header>

    <hr>

    <div class="content">{{content}}</div>

    <footer>
      <a href="/" class="footer-logo" title="Smashdown World">

  <script>
    const html   = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const saved  = localStorage.getItem('sw-theme') || 'dark';
    setTheme(saved);
    toggle.addEventListener('change', () => setTheme(toggle.checked ? 'light' : 'dark'));
    function setTheme(t) {
      html.dataset.theme = t;
      toggle.checked     = t === 'light';
      localStorage.setItem('sw-theme', t);
    }

    // Dropdown — hover on desktop, chevron tap on mobile
    const dropdown = document.querySelector('.nav-dropdown');
    if (dropdown) {
      const chevronBtn = dropdown.querySelector('.nav-chevron-btn');
      const menu       = dropdown.querySelector('.dropdown-menu');
      let closeTimer   = null;

      if (menu) {
        // Desktop: open on mouseenter, close on mouseleave with small delay
        dropdown.addEventListener('mouseenter', function() {
          clearTimeout(closeTimer);
          dropdown.classList.add('open');
        });
        dropdown.addEventListener('mouseleave', function() {
          closeTimer = setTimeout(function() {
            dropdown.classList.remove('open');
          }, 300);
        });
        // Keep open if mouse enters the menu itself
        menu.addEventListener('mouseenter', function() {
          clearTimeout(closeTimer);
        });
        menu.addEventListener('mouseleave', function() {
          closeTimer = setTimeout(function() {
            dropdown.classList.remove('open');
          }, 300);
        });
      }

      // Mobile: chevron tap toggles
      if (chevronBtn && menu) {
        chevronBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          dropdown.classList.toggle('open');
        });
      }
    }
  </script>
